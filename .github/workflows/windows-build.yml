name: Build Windows App

on:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "windows/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/windows-build.yml"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "Manual Windows build"

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.4"
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Windows release
        run: flutter build windows --release

      - name: Archive app folder
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath Strawberry-Manager-Windows-Release.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Strawberry-Manager-Windows-Release
          path: Strawberry-Manager-Windows-Release.zip
          retention-days: 14
